<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barking Reach Pollution 3D Grid</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #061129;
        --panel: rgba(9, 18, 43, 0.78);
        --panel-strong: rgba(8, 14, 33, 0.94);
        --line: rgba(107, 221, 244, 0.24);
        --text: #f4f2e9;
        --muted: #9fa9bd;
        --cyan: #68eff5;
        --gold: #f7dc4a;
        --danger: #ff6961;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 30% 20%, rgba(16, 94, 104, 0.24), transparent 34%),
          linear-gradient(135deg, #070e24 0%, #061129 52%, #050b1d 100%);
        color: var(--text);
        font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(113, 229, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(113, 229, 255, 0.045) 1px, transparent 1px),
          linear-gradient(rgba(113, 229, 255, 0.022) 1px, transparent 1px),
          linear-gradient(90deg, rgba(113, 229, 255, 0.022) 1px, transparent 1px);
        background-size: 64px 64px, 64px 64px, 8px 8px, 8px 8px;
        mask-image: linear-gradient(to bottom, black 0%, black 76%, transparent 100%);
      }

      #scene {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .title {
        position: fixed;
        top: 28px;
        left: 30px;
        z-index: 3;
        max-width: min(760px, calc(100vw - 420px));
        pointer-events: none;
      }

      .eyebrow {
        margin-bottom: 10px;
        color: rgba(244, 242, 233, 0.72);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4.5vw, 68px);
        line-height: 0.98;
        font-weight: 850;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 720px;
        margin: 14px 0 0;
        color: rgba(244, 242, 233, 0.78);
        font-size: clamp(15px, 1.4vw, 20px);
        line-height: 1.45;
      }

      .panel {
        position: fixed;
        top: 24px;
        right: 22px;
        z-index: 4;
        width: min(360px, calc(100vw - 44px));
        max-height: calc(100vh - 48px);
        overflow: auto;
        padding: 18px;
        border: 1px solid rgba(129, 232, 255, 0.24);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(16px);
      }

      .panel h2,
      .panel h3 {
        margin: 0;
        line-height: 1.2;
      }

      .panel h2 {
        font-size: 24px;
        font-weight: 850;
      }

      .panel h3 {
        color: var(--cyan);
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .controls {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      label {
        display: grid;
        gap: 7px;
        color: rgba(244, 242, 233, 0.82);
        font-size: 13px;
        font-weight: 750;
      }

      select,
      button,
      input[type="number"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: #101522;
        font: inherit;
        font-weight: 720;
      }

      select,
      input[type="number"] {
        padding: 0 12px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--gold);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .range-value {
        color: var(--muted);
        font-weight: 720;
      }

      .toggles {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        gap: 6px;
        padding: 9px 6px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }

      .toggle input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: var(--gold);
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        border-color: rgba(247, 220, 74, 0.42);
        background: var(--gold);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 16px;
      }

      .stat {
        min-height: 68px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 18px;
      }

      .formula {
        min-height: 92px;
        margin-top: 14px;
        padding: 12px;
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(2, 7, 19, 0.46);
        color: rgba(244, 242, 233, 0.76);
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .legend {
        position: fixed;
        right: 394px;
        bottom: 24px;
        left: 24px;
        z-index: 3;
        display: flex;
        align-items: end;
        gap: 10px;
        pointer-events: none;
      }

      .legend-card {
        min-width: 170px;
        padding: 12px 14px;
        border: 1px solid rgba(129, 232, 255, 0.2);
        border-radius: 9px;
        background: rgba(5, 11, 28, 0.74);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.26);
      }

      .legend-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .ramp {
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, #61d8ff, #75ef72, #fff15f, #ff8d72, #ff5daa, #aa74ff);
      }

      .legend-card .scale {
        display: flex;
        justify-content: space-between;
        margin-top: 7px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 760;
      }

      .chip {
        padding: 11px 13px;
        border: 1px solid rgba(129, 232, 255, 0.2);
        border-radius: 8px;
        background: rgba(5, 11, 28, 0.72);
        color: rgba(244, 242, 233, 0.86);
        font-weight: 830;
      }

      .tooltip {
        position: fixed;
        z-index: 8;
        display: none;
        max-width: 250px;
        padding: 10px 12px;
        border: 1px solid rgba(129, 232, 255, 0.28);
        border-radius: 8px;
        background: rgba(4, 9, 23, 0.9);
        color: var(--text);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
      }

      .tooltip strong {
        color: var(--cyan);
      }

      @media (max-width: 900px) {
        .title {
          right: 20px;
          max-width: none;
        }

        .subtitle {
          display: none;
        }

        .panel {
          top: auto;
          right: 12px;
          bottom: 12px;
          left: 12px;
          width: auto;
          max-height: 44vh;
        }

        .legend {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header class="title">
      <div class="eyebrow">Barking Reach Power Station / 5m CSM Grid</div>
      <h1>污染浓度 3D 方块网格</h1>
      <p class="subtitle">把二维污染风险表垂直展开：每一个 5m x 5m 场地网格成为一个立体方块柱，高度由所选污染变量驱动。</p>
    </header>

    <aside class="panel">
      <h3>Pollution Machine</h3>
      <h2>竖向展开控制</h2>

      <div class="controls">
        <label>
          污染变量 / Pollutant Field
          <select id="field">
            <option value="total_risk">总风险 Total risk</option>
            <option value="hydrocarbon">烃类 Hydrocarbon</option>
            <option value="metals">重金属 Metals</option>
            <option value="asbestos_rubble">石棉/瓦砾 Asbestos/Rubble</option>
            <option value="water_mobility">水迁移 Water mobility</option>
            <option value="ground_gas">地下气 Ground gas</option>
            <option value="confidence">证据置信 Confidence</option>
          </select>
        </label>

        <div class="row">
          <label>
            垂直倍率
            <input id="heightScale" type="range" min="2" max="34" step="1" value="16" />
            <span class="range-value" id="heightScaleValue">16</span>
          </label>
          <label>
            显示阈值
            <input id="threshold" type="range" min="0" max="95" step="1" value="0" />
            <span class="range-value" id="thresholdValue">0%</span>
          </label>
        </div>

        <div class="row">
          <label>
            透明度
            <input id="opacity" type="range" min="55" max="100" step="1" value="96" />
            <span class="range-value" id="opacityValue">96%</span>
          </label>
          <label>
            视角
            <select id="view">
              <option value="oblique">斜视 Oblique</option>
              <option value="top">俯视 Plan</option>
              <option value="section">剖面 Section</option>
            </select>
          </label>
        </div>

        <div class="toggles">
          <label class="toggle"><input id="showGrid" type="checkbox" checked />网格</label>
          <label class="toggle"><input id="showPlane" type="checkbox" checked />地面</label>
          <label class="toggle"><input id="autoRotate" type="checkbox" />旋转</label>
        </div>

        <div class="buttons">
          <button class="primary" id="resetCamera">重置视角</button>
          <button id="exportPng">导出 PNG</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><span>网格</span><strong id="cellCount">0</strong></div>
        <div class="stat"><span>可见</span><strong id="visibleCount">0</strong></div>
        <div class="stat"><span>峰值</span><strong id="peakValue">0</strong></div>
      </div>

      <div class="formula" id="formula"></div>
    </aside>

    <div class="legend">
      <div class="legend-card">
        <strong id="legendTitle">Total risk</strong>
        <div class="ramp" id="ramp"></div>
        <div class="scale"><span>low</span><span>high</span></div>
      </div>
      <div class="chip">15429 cells</div>
      <div class="chip">5m x 5m footprint</div>
      <div class="chip">vertical risk extrusion</div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script type="module" src="./pollution-3d.js"></script>
  </body>
</html>
